version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Sentinel — Local Development Stack
#
# Services:
#   api-gateway        → http://localhost:4000     (main entrypoint)
#   auth-service       → http://localhost:4001
#   ingestion-service  → http://localhost:4002
#   orchestrator       → http://localhost:4003
#   postgres           → localhost:5432
#   rabbitmq           → localhost:5672 (AMQP), localhost:15672 (Management UI)
#   redis              → localhost:6379
#   neo4j              → bolt://localhost:7687, http://localhost:7474 (Browser UI)
#   prometheus         → http://localhost:9090
#   grafana            → http://localhost:3001
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  NODE_ENV: development
  DATABASE_URL: postgresql://sentinel:sentinel@postgres:5432/sentinel
  RABBITMQ_URL: amqp://sentinel:sentinel@rabbitmq:5672
  REDIS_URL: redis://redis:6379
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-sentinel-neo4j-password}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-sentinel-access-secret-min-32-chars}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-sentinel-refresh-secret-min-32-chars}
  JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-1h}
  JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-30}
  INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-in-prod}

services:
  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - '4000:4000'
    depends_on:
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      AUTH_SERVICE_URL: http://auth-service:4001
      INGESTION_SERVICE_URL: http://ingestion-service:4002
      ORCHESTRATOR_URL: http://orchestrator:4003

  # ── Auth Service ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ..
      dockerfile: apps/auth-service/Dockerfile
    ports:
      - '4001:4001'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 4001
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-your_github_oauth_client_id}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-your_github_oauth_client_secret}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:4001/auth/github/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4001/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ingestion Service ─────────────────────────────────────────────────────
  ingestion-service:
    build:
      context: ..
      dockerfile: apps/ingestion-service/Dockerfile
    ports:
      - '4002:4002'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 4002
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-dev-webhook-secret-change-in-prod}

  # ── Orchestrator ──────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ..
      dockerfile: apps/orchestrator/Dockerfile
    ports:
      - '4003:4003'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 4003
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-in-prod}

  # ── Analysis Engine (Python) ──────────────────────────────────────────────
  analysis-engine:
    build:
      context: ..
      dockerfile: apps/analysis-engine/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://sentinel:sentinel@rabbitmq:5672
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-sentinel-neo4j-password}
      ORCHESTRATOR_URL: http://orchestrator:4003
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-in-prod}
      LOG_LEVEL: INFO

  # ── PostgreSQL 15 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sentinel']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── RabbitMQ 3.13 ─────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - '5672:5672'    # AMQP
      - '15672:15672'  # Management UI (user: sentinel / sentinel)
    environment:
      RABBITMQ_DEFAULT_USER: sentinel
      RABBITMQ_DEFAULT_PASS: sentinel
      RABBITMQ_PLUGINS: rabbitmq_management
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Neo4j 5 (Graph Database) ───────────────────────────────────────────────
  # Browser UI: http://localhost:7474  (bolt://localhost:7687)
  # Login: neo4j / sentinel-neo4j-password
  neo4j:
    image: neo4j:5-community
    ports:
      - '7474:7474'  # HTTP Browser UI
      - '7687:7687'  # Bolt protocol (driver connection)
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-sentinel-neo4j-password}
      # Enable APOC plugin (needed for advanced graph procedures)
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: 'apoc.*'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:7474 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - '3001:3000'
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  pg_data:
  rabbitmq_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  prometheus_data:
  grafana_data:
